<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" role="img" aria-label="Aurora landing page preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="0.5" stop-color="#f7f9fc"/>
      <stop offset="1" stop-color="#f7f9fc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>
  <!-- navbar -->
  <rect x="0" y="0" width="1200" height="56" fill="#ffffff" opacity="0.7"/>
  <rect x="48" y="20" width="24" height="16" rx="5" fill="#3b82f6"/>
  <rect x="84" y="22" width="70" height="12" rx="6" fill="#0b1220"/>
  <rect x="980" y="16" width="120" height="24" rx="8" fill="#3b82f6"/>
  <!-- hero -->
  <rect x="430" y="150" width="340" height="22" rx="11" fill="#dbeafe"/>
  <rect x="240" y="200" width="720" height="40" rx="10" fill="#0b1220"/>
  <rect x="320" y="252" width="560" height="40" rx="10" fill="#0b1220"/>
  <rect x="400" y="320" width="400" height="16" rx="8" fill="#5b6b82"/>
  <rect x="470" y="372" width="120" height="44" rx="12" fill="#3b82f6"/>
  <rect x="610" y="372" width="120" height="44" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <!-- feature cards -->
  <g>
    <rect x="160" y="490" width="260" height="180" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="470" y="490" width="260" height="180" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="780" y="490" width="260" height="180" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="190" y="520" width="120" height="16" rx="8" fill="#0b1220"/>
    <rect x="500" y="520" width="120" height="16" rx="8" fill="#0b1220"/>
    <rect x="810" y="520" width="120" height="16" rx="8" fill="#0b1220"/>
    <rect x="190" y="556" width="200" height="10" rx="5" fill="#5b6b82"/>
    <rect x="500" y="556" width="200" height="10" rx="5" fill="#5b6b82"/>
    <rect x="810" y="556" width="200" height="10" rx="5" fill="#5b6b82"/>
  </g>
</svg>
